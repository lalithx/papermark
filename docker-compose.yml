services:
  # --- The Application ---
  papermark:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_APP_DOMAIN=docs.flexgrid.cloud
        - NEXT_PUBLIC_APP_BASE_HOST=docs.flexgrid.cloud
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://papermark:your_db_password@db:5432/papermark
      - POSTGRES_PRISMA_URL=postgresql://papermark:your_db_password@db:5432/papermark

  # --- Metadata Storage (Postgres) ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: papermark
      POSTGRES_PASSWORD: your_db_password
      POSTGRES_DB: papermark
    volumes:
      - ./papermark-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papermark"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Blob Storage (MinIO) ---
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secure_password
    volumes:
      - ./papermark-data/minio:/data
    ports:
      - "9001:9001" # Console Access (Optional, for setup)
      - "9000:9000" # API Access
    command: server /data --console-address ":9001"

volumes:
  # Using bind mounts (defined in services), so named volumes aren't strictly required
  # but keeping the block here for standard docker-compose structure.
  postgres_data:
  minio_data: